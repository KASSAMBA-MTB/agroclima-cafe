<div class="kpi-card">

    <div class="kpi-header">

        <div class="kpi-icon {{ color }}">

            <i class="bi {{ icon }}"></i>

        </div>

        <span class="kpi-variation">

            {{ variation }}

        </span>

    </div>

    <div class="kpi-body">

        <span class="kpi-title">

            {{ title }}

        </span>

        <h2>

            {{ value }}

        </h2>

    </div>

    <div class="kpi-footer">

        <small>

            Atualizado agora

        </small>

    </div>

</div>
