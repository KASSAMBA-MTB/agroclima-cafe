<div class="kpi-card">

    <div class="kpi-header">

        <div class="kpi-icon {{ color }}">

            <i class="bi {{ icon }}"></i>

        </div>

        <span class="kpi-variation">

            {{ variation }}

        </span>

    </div>

    <div class="kpi-body">

        <span class="kpi-title">

            {{ title }}

        </span>

        <h2>

            {{ value }}

            {% if unit %}
                <small class="kpi-unit">{{ unit }}</small>
            {% endif %}

        </h2>

    </div>

    <div class="kpi-footer">

        <small>

            <i class="bi bi-arrow-repeat"></i>

            {{ ultima_atualizacao|date:"H:i" }}

        </small>

    </div>

</div>
