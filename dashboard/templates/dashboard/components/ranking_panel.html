<section class="dashboard-panel">

    <div class="panel-header">

        <div>

            <h2>

                Ranking AgroClima

            </h2>

            <p>

                Classificação dos municípios monitorados pelo Índice AgroClima (IAC).

            </p>

        </div>

    </div>

    <div class="ranking-list">

        {% for cidade in ranking %}

        <div class="ranking-item">

            <!-- ============================= -->
            <!-- POSIÇÃO                       -->
            <!-- ============================= -->

            <div class="ranking-position">

                {{ cidade.posicao }}º

            </div>

            <!-- ============================= -->
            <!-- MUNICÍPIO                     -->
            <!-- ============================= -->

            <div class="ranking-city">

                <strong>

                    {{ cidade.municipio }}

                </strong>

                <span>

                    {{ cidade.estado }}

                </span>

            </div>

            <!-- ============================= -->
            <!-- ÍNDICE AGROCLIMA              -->
            <!-- ============================= -->

            <div class="ranking-score">

                <h4>

                    {{ cidade.indice }}

                </h4>

                <small>

                    IAC

                </small>

            </div>

            <!-- ============================= -->
            <!-- CLASSIFICAÇÃO                 -->
            <!-- ============================= -->

            <div class="ranking-classification">

                <i class="bi {{ cidade.icone }}"
                   style="color: {{ cidade.cor }};">

                </i>

                <span>

                    {{ cidade.classificacao }}

                </span>

            </div>

        </div>

        {% endfor %}

    </div>

</section>
