{% load static %}

<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        {% block title %}

            AgroClima Café

        {% endblock %}

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet"
    >

    <!-- CSS do Dashboard -->

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/dashboard.css' %}"
    >

</head>

<body>

    <!-- HEADER -->

    <nav class="navbar navbar-dark shadow-sm">

        <div class="container-fluid">

            <div class="d-flex align-items-center">

                <i
                    class="bi bi-cup-hot-fill me-2 text-warning"
                    style="font-size:30px;"
                ></i>

                <div>

                    <h4 class="m-0">

                        AgroClima Café

                    </h4>

                    <small>

                        Plataforma Inteligente de Monitoramento Climático

                    </small>

                </div>

            </div>

            <div class="text-end">

                <strong>

                    Dashboard Climático

                </strong>

                <br>

                <small>

                    Ciência de Dados • UNIVESP

                </small>

            </div>

        </div>

    </nav>


    <!-- CONTEÚDO -->

    <main class="container-fluid py-4">

        {% block content %}

        {% endblock %}

    </main>


    <!-- RODAPÉ -->

    <footer class="footer">

        <div class="container">

            <div class="row">

                <div class="col-md-6">

                    AgroClima Café © 2026

                </div>

                <div class="col-md-6 text-end">

                    Desenvolvido em Django + PostgreSQL + Open-Meteo

                </div>

            </div>

        </div>

    </footer>

    <!-- Bootstrap -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- ChartJS -->

    <script
        src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>

    <!-- JS do Dashboard -->

    <script
        src="{% static 'dashboard/js/dashboard.js' %}">
    </script>

</body>

</html>
