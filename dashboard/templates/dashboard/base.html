{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            AgroClima Café
        {% endblock %}
    </title>

    <!-- ==========================================================
         Bootstrap
    =========================================================== -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <!-- ==========================================================
         Google Fonts
    =========================================================== -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">

    <!-- ==========================================================
         AGROCLIMA DESIGN SYSTEM
    =========================================================== -->

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/variables.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/theme.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/layout.css' %}">

    <!-- ==========================================================
         COMPONENTES
    =========================================================== -->

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/header.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/sidebar.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/dashboard.css' %}">

    <!-- ==========================================================
         DASHBOARD
    =========================================================== -->

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/kpi.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/chart.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/ranking.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/insights.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/map.css' %}">

    <link
        rel="stylesheet"
        href="{% static 'dashboard/css/alerts.css' %}">

    <!-- ==========================================================
         FAVICON (Sprint futura)
    =========================================================== -->

    {# 
    <link
        rel="icon"
        href="{% static 'dashboard/img/favicon.ico' %}">
    #}

</head>

<body>

<div class="app-wrapper">

    <!-- ==========================================================
         SIDEBAR
    =========================================================== -->

    {% include "dashboard/components/sidebar.html" %}

    <!-- ==========================================================
         ÁREA PRINCIPAL
    =========================================================== -->

    <main class="main-content">

        <!-- Header -->

        {% include "dashboard/components/header.html" %}

        <!-- Conteúdo -->

        <section class="page-content">

            {% block content %}

            {% endblock %}

        </section>

        <!-- Rodapé -->

        {% include "dashboard/components/footer.html" %}

    </main>

</div>

<!-- ==========================================================
     Bootstrap
=========================================================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ==========================================================
     Chart.js
=========================================================== -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ==========================================================
     Dashboard
=========================================================== -->

<script src="{% static 'dashboard/js/dashboard.js' %}"></script>

<!-- ==========================================================
     Componentes
=========================================================== -->

<script src="{% static 'dashboard/js/kpi.js' %}"></script>

<script src="{% static 'dashboard/js/chart.js' %}"></script>

<script src="{% static 'dashboard/js/ranking.js' %}"></script>

<script src="{% static 'dashboard/js/insights.js' %}"></script>

<script src="{% static 'dashboard/js/map.js' %}"></script>

<script src="{% static 'dashboard/js/alerts.js' %}"></script>

</body>

</html>
